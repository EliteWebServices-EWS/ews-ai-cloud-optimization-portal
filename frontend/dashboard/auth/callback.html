<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <meta name="robots" content="noindex, nofollow">
  <title>Completing Sign-In | SISU'M</title>
  <link rel="icon" href="/assets/logo/ews-logo-primary.png">
  <style>
    :root {
      color-scheme: dark;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system,
        BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #09090b;
      color: #f4f4f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, #1f2937 0, #09090b 52%);
    }

    .auth-card {
      width: min(100%, 520px);
      padding: 40px;
      border: 1px solid #27272a;
      border-radius: 16px;
      background: rgba(24, 24, 27, 0.94);
      text-align: center;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
    }

    .auth-card img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    .auth-card h1 {
      margin: 0 0 12px;
      font-size: 1.7rem;
    }

    .auth-card p {
      margin: 0;
      color: #d4d4d8;
      line-height: 1.6;
    }

    .auth-error {
      color: #fca5a5 !important;
    }

    #retry-login {
      display: inline-block;
      margin-top: 24px;
      color: #fb923c;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="auth-card">
    <img
      src="/assets/logo/ews-logo-primary.png"
      alt="Elite Web Services"
    >
    <h1>Completing secure sign-in</h1>
    <p id="auth-status">
      Please wait while SISU'M verifies your session.
    </p>
    <a
      id="retry-login"
      href="/dashboard/index.html"
      hidden
    >
      Return to the dashboard
    </a>
  </main>

  <script
    type="module"
    src="../src/auth/callback.ts"
  ></script>
</body>
</html>
