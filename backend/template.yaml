AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: >
  SISU'M Backend — API Gateway HTTP API and Lambda for the Cloud Optimization
  Decision Platform using the Express serverless adapter.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Deployment environment used for resource naming and NODE_ENV.

  ProviderMode:
    Type: String
    Default: mock
    AllowedValues:
      - mock
      - aws
    Description: >
      Provider selection for the backend. MVP deployments must use mock.

  CorsOrigin:
    Type: String
    Default: https://elitewebservices.org
    Description: >
      Legacy primary CORS origin parameter. Production deployments should
      rely on the built-in allowlist in backend/security/cors.ts.

  CorsAllowedOrigins:
    Type: String
    Default: https://elitewebservices.org,https://www.elitewebservices.org
    Description: >
      Comma-separated production CORS allowlist passed to CORS_ALLOWED_ORIGINS.

  LogLevel:
    Type: String
    Default: info
    AllowedValues:
      - debug
      - info
      - warn
      - error
    Description: Structured log level for backend components.

  CognitoUserPoolId:
    Type: String
    Default: us-east-1_DARrpLb5p
    Description: Cognito User Pool ID used to construct the JWT issuer.

  CognitoUserPoolClientId:
    Type: String
    Default: 1dc1g0tkflsspjd7uc6n131jft
    Description: Cognito public SPA app client ID used as the JWT audience.

  AuditRetentionDays:
    Type: Number
    Default: 365
    MinValue: 1
    MaxValue: 2555
    Description: Audit record retention in days before DynamoDB TTL expiration.

  AuditPersistenceEnabled:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: >
      Enables DynamoDB audit persistence in addition to CloudWatch logging.

  DefaultTenantId:
    Type: String
    Default: sisum-default
    Description: >
      Default tenant identifier for audit records in the single-tenant MVP.

  TenantEnforcementMode:
    Type: String
    Default: compatibility
    AllowedValues:
      - strict
      - compatibility
    Description: >
      strict requires custom:tenantId on authenticated requests unless
      TENANT_FALLBACK_ENABLED=true. compatibility falls back to DefaultTenantId.

  TenantFallbackEnabled:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: >
      Allows DEFAULT_TENANT_ID fallback when strict mode is enabled.

Globals:
  Function:
    Runtime: nodejs24.x
    Timeout: 30
    MemorySize: 512
    Architectures:
      - arm64

  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - https://elitewebservices.org
        - https://www.elitewebservices.org
      AllowHeaders:
        - Content-Type
        - Authorization
        - X-Request-Id
        - X-Correlation-Id
      AllowMethods:
        - GET
        - POST
        - OPTIONS

Resources:
  SisumAuditTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "sisum-audit-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      Tags:
        - Key: Project
          Value: SISUM
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: AuditPersistence

  SisumAuditTablePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "sisum-audit-dynamodb-${Environment}"
      Roles:
        - SisumLambdaExecutionRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AuditTableWriteRead
            Effect: Allow
            Action:
              - dynamodb:PutItem
              - dynamodb:Query
            Resource:
              - !GetAtt SisumAuditTable.Arn

  SisumHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: !Sub "sisum-http-api-${Environment}"
      StageName: $default
      Description: SISU'M Backend HTTP API

      DefaultRouteSettings:
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

      Auth:
        DefaultAuthorizer: SisumJwtAuthorizer
        Authorizers:
          SisumJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              audience:
                - !Ref CognitoUserPoolClientId
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}"

  SisumBackendLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/sisum-backend-${Environment}"
      RetentionInDays: 14

  SisumBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "sisum-backend-${Environment}"
      Description: SISU'M Cloud Optimization Decision Platform API
      CodeUri: .
      Handler: dist/lambda.handler
      Role: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/SisumLambdaExecutionRole"
      ReservedConcurrentExecutions: 25

      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          ENVIRONMENT: !Ref Environment
          PROVIDER_MODE: !Ref ProviderMode
          CORS_ORIGIN: !Ref CorsOrigin
          CORS_ALLOWED_ORIGINS: !Ref CorsAllowedOrigins
          LOG_LEVEL: !Ref LogLevel
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_USER_POOL_CLIENT_ID: !Ref CognitoUserPoolClientId
          NODE_OPTIONS: "--enable-source-maps"
          AUDIT_TABLE_NAME: !Ref SisumAuditTable
          AUDIT_RETENTION_DAYS: !Ref AuditRetentionDays
          AUDIT_PERSISTENCE_ENABLED: !Ref AuditPersistenceEnabled
          DEFAULT_TENANT_ID: !Ref DefaultTenantId
          TENANT_ENFORCEMENT_MODE: !Ref TenantEnforcementMode
          TENANT_FALLBACK_ENABLED: !Ref TenantFallbackEnabled

      Events:
        PublicHealthRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref SisumHttpApi
            Path: /api/v1/health
            Method: GET
            Auth:
              Authorizer: NONE

        PublicPreflightRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref SisumHttpApi
            Path: /{proxy+}
            Method: OPTIONS
            Auth:
              Authorizer: NONE

        PublicRootPreflightRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref SisumHttpApi
            Path: /
            Method: OPTIONS
            Auth:
              Authorizer: NONE

        RootRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref SisumHttpApi
            Path: /
            Method: ANY
            Auth:
              Authorizer: SisumJwtAuthorizer

        ProtectedProxyRoute:
          Type: HttpApi
          Properties:
            ApiId: !Ref SisumHttpApi
            Path: /{proxy+}
            Method: ANY
            Auth:
              Authorizer: SisumJwtAuthorizer

Outputs:
  ApiUrl:
    Description: HTTP API base URL. Use with /api/v1/health and other routes.
    Value: !GetAtt SisumHttpApi.ApiEndpoint
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"

  ApiId:
    Description: HTTP API identifier.
    Value: !Ref SisumHttpApi
    Export:
      Name: !Sub "${AWS::StackName}-ApiId"

  LambdaFunctionName:
    Description: Lambda function name.
    Value: !Ref SisumBackendFunction
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionName"

  LambdaArn:
    Description: Lambda function ARN.
    Value: !GetAtt SisumBackendFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaArn"

  Environment:
    Description: Deployed environment.
    Value: !Ref Environment
    Export:
      Name: !Sub "${AWS::StackName}-Environment"

  ProviderMode:
    Description: Active provider mode.
    Value: !Ref ProviderMode
    Export:
      Name: !Sub "${AWS::StackName}-ProviderMode"

  CognitoUserPoolId:
    Description: Cognito User Pool used by the JWT authorizer.
    Value: !Ref CognitoUserPoolId

  CognitoUserPoolClientId:
    Description: Cognito app client used as the JWT audience.
    Value: !Ref CognitoUserPoolClientId

  AuditTableName:
    Description: DynamoDB audit table name.
    Value: !Ref SisumAuditTable
    Export:
      Name: !Sub "${AWS::StackName}-AuditTableName"

  AuditTableArn:
    Description: DynamoDB audit table ARN.
    Value: !GetAtt SisumAuditTable.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AuditTableArn"

  JwtIssuer:
    Description: JWT issuer configured on API Gateway.
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}"