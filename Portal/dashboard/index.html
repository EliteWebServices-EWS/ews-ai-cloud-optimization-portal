<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EWS-Lite Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex flex-col">

    <header class="bg-slate-800 border-b border-slate-700 h-16 flex items-center justify-between px-6 z-10 shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-extrabold tracking-wider text-blue-400">Elite Web Services</span>
            <span class="bg-blue-900 text-blue-300 text-xs font-semibold px-2.5 py-0.5 rounded border border-blue-800">Lite Portal</span>
        </div>
        <div class="flex items-center space-x-4">
            <button class="bg-slate-700 hover:bg-rose-700 text-white text-sm font-medium px-4 py-2 rounded transition-colors shadow">
                Logout
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col p-4 space-y-2">
            <a href="#" class="flex items-center space-x-3 bg-slate-900 text-blue-400 px-4 py-3 rounded-lg font-semibold transition shadow-inner">
                <span>📊 Overview</span>
            </a>
            <a href="#" class="flex items-center space-x-3 text-slate-400 hover:bg-slate-700 hover:text-white px-4 py-3 rounded-lg font-medium transition">
                <span>💰 Cost</span>
            </a>
            <a href="#" class="flex items-center space-x-3 text-slate-400 hover:bg-slate-700 hover:text-white px-4 py-3 rounded-lg font-medium transition">
                <span>🛡️ Security</span>
            </a>
            <a href="#" class="flex items-center space-x-3 text-slate-400 hover:bg-slate-700 hover:text-white px-4 py-3 rounded-lg font-medium transition">
                <span>☁️ Resources</span>
            </a>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 bg-slate-900">
            <div class="max-w-6xl mx-auto">
                
                <div class="mb-8">
                    <h2 class="text-3xl font-bold tracking-tight text-white">EWS-Lite Dashboard</h2>
                    <p class="text-slate-400 text-sm mt-1">Static layout shell (No AWS, No APIs).</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl shadow-lg relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-emerald-500"></div>
                        <h3 class="text-slate-400 text-sm font-bold uppercase tracking-wider">Monthly Spend</h3>
                        <p class="text-3xl font-extrabold mt-2 text-white">$1,240.50</p>
                        <span class="text-emerald-400 text-xs font-semibold mt-1 inline-block">↓ 4.2% vs last month</span>
                    </div>

                    <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl shadow-lg relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                        <h3 class="text-slate-400 text-sm font-bold uppercase tracking-wider">EC2 Count</h3>
                        <p class="text-3xl font-extrabold mt-2 text-white">14</p>
                        <span class="text-slate-400 text-xs font-medium mt-1 inline-block">All instances stable</span>
                    </div>

                    <div class="bg-slate-800 border border-slate-700 p-6 rounded-xl shadow-lg relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-amber-500"></div>
                        <h3 class="text-slate-400 text-sm font-bold uppercase tracking-wider">Security Alerts</h3>
                        <p class="text-3xl font-extrabold mt-2 text-amber-400">3</p>
                        <span class="text-amber-300 text-xs font-semibold mt-1 inline-block">⚠️ Review recommended</span>
                    </div>

                </div>

            </div>
        </main>
    </div>

</body>
</html>
