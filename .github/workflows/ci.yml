name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify frontend Pages artifact
        run: |
          test -f frontend/index.html
          test -d frontend/pages
          test -d frontend/styles
          test -d frontend/assets
          test -f frontend/js/ews-nav.js

      - name: Verify backend SAM template present
        run: test -f backend/template.yaml
