name: Deploy Frontend to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Decision Dashboard
        working-directory: frontend
        env:
          GITHUB_ACTIONS: "true"
          VITE_API_BASE: ${{ vars.VITE_API_BASE || '' }}
        run: |
          npm ci
          npm run build
          cp -r dashboard-dist/* dashboard/
          rm -rf dashboard-dist dashboard/src

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Prepare Pages artifact
        run: |
          if [ -f .nojekyll ]; then
            cp .nojekyll frontend/.nojekyll
          else
            touch frontend/.nojekyll
          fi

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./frontend"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 1200000
